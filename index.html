  <main class="page-content">

    <!-- ── Hero ── -->
    <section class="page-hero">
      <div class="container">
        <div class="hero-text">
          <span class="hero-eyebrow">База клиентов</span>
          <h1 class="hero-title">Ваши <span>клиенты</span></h1>
          <p class="hero-sub">Управляйте базой и отслеживайте статусы в одном месте</p>
        </div>
        <div class="hero-actions">
          <span class="badge-count">
            <strong id="totalCount">0</strong> всего
          </span>
          <span class="badge-count">
            Показано: <strong id="clientCount">0</strong>
          </span>
          <a href="form.html" class="btn btn-primary">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            Добавить клиента
          </a>
        </div>
      </div>
    </section>

    <!-- ── Toolbar ── -->
    <section class="toolbar">
      <div class="container">
        <!-- Search -->
        <div class="search-wrap">
          <span class="search-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
          </span>
          <input
            type="text"
            id="searchInput"
            class="search-input"
            placeholder="Поиск по имени, email или телефону…"
            autocomplete="off"
          />
          <button class="search-clear" id="searchClear" title="Очистить поиск">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>

        <!-- Filters -->
        <div class="filter-tabs" role="group" aria-label="Фильтр по статусу">
          <button class="filter-btn active" data-filter="all">
            Все <span class="filter-badge">0</span>
          </button>
          <button class="filter-btn" data-filter="new">
            Новые <span class="filter-badge">0</span>
          </button>
          <button class="filter-btn" data-filter="active">
            В работе <span class="filter-badge">0</span>
          </button>
          <button class="filter-btn" data-filter="completed">
            Завершённые <span class="filter-badge">0</span>
          </button>
        </div>
      </div>
    </section>

    <!-- ── Client Grid ── -->
    <section class="clients-section">
      <div class="container">
        <div class="clients-grid" id="clientsGrid">
          <!-- Rendered by main.js -->
        </div>
      </div>
    </section>

  </main>

  <footer class="page-footer">
    NexusCRM &copy; 2026 · NOXQD &middot; <a href="mailto:art303750@gmail.com" style="color:var(--accent-l)">art303750@gmail.com</a>
  </footer>

</div>
